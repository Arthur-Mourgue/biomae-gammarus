# MobileNetV3 classification configuration

model:
  architecture: mobilenet_v3_large
  num_classes: 4
  classes:
    - couple
    - femelle
    - indeterminee
    - male

input:
  size: 512
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

inference:
  use_argmax: true
  thresholds:
    couple: 0.50
    femelle: 0.40
    male: 0.40
    indeterminee: 0.50

aggregation:
  mode: mean  # mean or max — across multiple crops per image

checkpoints:
  weights: checkpoints/mobilenet_v3_v4.pth
  meta: checkpoints/model_meta.json

# Legacy MLP fusion (Train_MLP experiment)
fusion:
  hidden_size: 256
  dropout: 0.5
  weights: checkpoints/fusion_mlp.pth
